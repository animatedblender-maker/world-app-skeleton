    (function () {
      var params = new URLSearchParams(window.location.search);
      var redirect = params.get('redirect');
      if (!redirect) return;
      params.delete('redirect');

      var rest = params.toString();
      if (rest) {
        target += (target.indexOf('?') === -1 ? '?' : '&') + rest;
      }
      history.replaceState(null, '', target);
    })();
  </script>
